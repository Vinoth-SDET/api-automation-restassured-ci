version: 2
updates:

  # Maven dependencies
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - java
    ignore:
      # Pin major versions — only auto-update patch/minor
      - dependency-name: "org.testng:testng"
        update-types: ["version-update:semver-major"]
      - dependency-name: "io.rest-assured:rest-assured"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - github-actions