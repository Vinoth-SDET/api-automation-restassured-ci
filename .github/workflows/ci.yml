name: CI - API Automation Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "qa"
        type: choice
        options: [ dev, qa, staging ]
      suite:
        description: "Test suite to run"
        required: true
        default: "regression"
        type: choice
        options: [ smoke, regression, parallel ]

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx1024m -XX:+TieredCompilation -XX:TieredStopAtLevel=1"

# ── Job 1: Compile & Validate ─────────────────────────────────────────────────
jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Compile (main + test sources)
        run: mvn compile test-compile -B --no-transfer-progress

      - name: Validate project structure
        run: mvn validate -B --no-transfer-progress


  # ── Job 2: Run Tests (matrix over suites) ────────────────────────────────────
  test:
    name: "Test [${{ matrix.suite }}] on ${{ matrix.env }}"
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        env:   [ qa ]
        suite: [ smoke, regression ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Run ${{ matrix.suite }} suite on ${{ matrix.env }}
        env:
          QA_AUTH_TOKEN:      ${{ secrets.QA_AUTH_TOKEN }}
          DEV_AUTH_TOKEN:     ${{ secrets.DEV_AUTH_TOKEN }}
          STAGING_AUTH_TOKEN: ${{ secrets.STAGING_AUTH_TOKEN }}
        run: |
          mvn test -B --no-transfer-progress \
            -Denv=${{ matrix.env }} \
            -Dtestng.suite=src/test/resources/testng-suites/${{ matrix.suite }}.xml \
            -Dthreads=5 \
            -Dlog.level=INFO

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}-${{ matrix.env }}
          path: allure-results/
          retention-days: 14

      - name: Upload log files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.suite }}-${{ matrix.env }}
          path: target/logs/
          retention-days: 7


  # ── Job 3: Publish Allure Report to GitHub Pages ──────────────────────────────
  report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for gh-pages history

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Generate & publish Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results:  allure-results
          gh_pages:        gh-pages
          allure_report:   allure-report
          allure_history:  allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token:  ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir:   allure-history
