name: CI - API Automation Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "qa"
        type: choice
        options: [ dev, qa, staging ]

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Xmx1024m"

jobs:

  # Job 1: Compile and Validate
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Compile
        run: mvn compile test-compile -B

  # Job 2: Run Tests
  test:
    name: Test [${{ matrix.suite }}] on ${{ matrix.env }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [ qa ]
        suite: [ smoke, regression ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}

      - name: Run ${{ matrix.suite }} suite
        env:
          QA_AUTH_TOKEN: ${{ secrets.QA_AUTH_TOKEN }}
        run: |
          mvn test -B \
            -Denv=${{ matrix.env }} \
            -Dtestng.suite=src/test/resources/testng-suites/${{ matrix.suite }}.xml \
            -Dthreads=5

      - name: Debug - list allure-results directory
        if: always()
        run: |
          echo "=== Project root ==="
          ls -la
          echo "=== allure-results (root) ==="
          ls -la allure-results/ 2>/dev/null || echo "NOT FOUND at root"
          echo "=== target/allure-results ==="
          ls -la target/allure-results/ 2>/dev/null || echo "NOT FOUND at target/allure-results"
          echo "=== extent-reports ==="
          ls -la target/extent-reports/ 2>/dev/null || echo "NOT FOUND"

      # Allure writes to allure-results/ at project root (not target/)
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.suite }}-${{ matrix.env }}
          path: allure-results/
          if-no-files-found: warn
          retention-days: 14

      # ExtentReports writes to target/extent-reports/
      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.suite }}-${{ matrix.env }}
          path: target/extent-reports/TestReport.html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload log files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.suite }}-${{ matrix.env }}
          path: target/logs/
          if-no-files-found: warn

  # Job 3: Publish Allure Report to GitHub Pages
  report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-results/
          merge-multiple: true

      - name: Debug - show downloaded results
        run: |
          echo "=== Downloaded allure-results ==="
          find allure-results/ -type f 2>/dev/null || echo "allure-results directory is empty"

      - name: Generate and Deploy Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history