name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-smoke:
    name: Compile + Smoke (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [qa]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile --no-transfer-progress

      - name: Run smoke suite
        run: |
          mvn test \
            -Denv=${{ matrix.env }} \
            -Dtestng.suite=src/test/resources/testng-suites/smoke.xml \
            -Dthreads=3 \
            --no-transfer-progress
        env:
          QA_AUTH_TOKEN: ${{ secrets.QA_AUTH_TOKEN }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-smoke-${{ matrix.env }}
          path: allure-results
          retention-days: 7

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-smoke-${{ matrix.env }}
          path: target/extent-reports/
          retention-days: 7

  regression:
    name: Regression — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: build-and-smoke
    strategy:
      fail-fast: false
      matrix:
        suite: [regression, contract, negative]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run ${{ matrix.suite }} suite
        run: |
          mvn test \
            -Denv=qa \
            -Dtestng.suite=src/test/resources/testng-suites/${{ matrix.suite }}.xml \
            -Dthreads=5 \
            --no-transfer-progress
        env:
          QA_AUTH_TOKEN: ${{ secrets.QA_AUTH_TOKEN }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.suite }}
          path: allure-results
          retention-days: 14

      - name: Upload ExtentReport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-${{ matrix.suite }}
          path: target/extent-reports/
          retention-days: 14

  publish-allure-pages:
    name: Publish Allure to GitHub Pages
    needs: regression
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-*
          path: all-allure-results
          merge-multiple: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: all-allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history